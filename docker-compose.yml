services:
  # ─── Base de datos PostgreSQL ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ush_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ush_chatbot}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/sql/flows_schema.sql:/docker-entrypoint-initdb.d/02-flows.sql:ro
    ports:
      - "127.0.0.1:5432:5432"   # Accesible solo desde localhost para gestión de BD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ush_network

  # ─── ChromaDB (base de datos vectorial) ─────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: ush_chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "127.0.0.1:8000:8000"   # Solo localhost — no debe ser público
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "bash", "-c", "(echo > /dev/tcp/localhost/8000) 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ush_network

  # ─── Backend Node.js API ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ush_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ush_chatbot}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      CHROMA_URL: http://chromadb:8000
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      TOP_K: ${TOP_K:-5}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    # Puerto solo para debug directo — en producción todo pasa por nginx
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - ush_network

  # ─── Frontend React — panel admin (dashboard) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /chatbot-api
        VITE_BASE_PATH: /chatbot-demo/
    container_name: ush_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:80"   # Solo localhost — acceso admin interno
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ush_network

  # ─── Widget embebible (solo el script JS/CSS público) ────────
  widget:
    build:
      context: ./frontend
      dockerfile: Dockerfile.widget
      args:
        VITE_API_URL: /api
    container_name: ush_widget
    restart: unless-stopped
    ports:
      - "8084:80"             # Puerto público — solo sirve el widget y la API
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/widget/ush-chat-widget.iife.js || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ush_network

volumes:
  postgres_data:
  chroma_data:
  uploads_data:
  logs_data:

networks:
  ush_network:
    driver: bridge
