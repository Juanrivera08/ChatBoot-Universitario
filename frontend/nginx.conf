server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Cache para assets estáticos del panel admin
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Widget estático ────────────────────────────────────────────
    # Compilado en el build del frontend y servido directamente por nginx.
    # WordPress lo embebe con: <script src="https://tu-dominio/widget/ush-chat-widget.iife.js">
    location /widget/ {
        alias /usr/share/nginx/html/widget/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── SSE — streaming de respuestas IA ──────────────────────────
    # proxy_buffering off es OBLIGATORIO para Server-Sent Events.
    # Sin esto nginx acumula los chunks y los manda todos juntos al final,
    # rompiendo el efecto de escritura en tiempo real.
    location /api/chat/message/stream {
        proxy_pass http://backend:3001/api/chat/message/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        add_header X-Accel-Buffering no;
        chunked_transfer_encoding on;
    }

    # ── Proxy inverso para el resto de la API ─────────────────────
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── SPA fallback ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
